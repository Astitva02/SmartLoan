<!DOCTYPE html>
<html>
  <head>
    <link rel="stylesheet" href="usernewapp.css">
  </head>
  <body>
    <div class="header">
        <div class="left-section">
          <img class="logo"src="image/Logo.png">
        </div>
        <div class="middle-section">
          <button class="home">Home</button>
          <button class="about-us">About us</button>
          <button class="case-studies">Case studies</button> 
          <button class="blog">Our blog</button>
        </div>
        <div class="left-section">
          <button class="admin">Admin </button> 
          <button class="user-button">User</button>
          
          <button class="contact">
            Contact us
          </button>
        </div>
      </div>
      <div class="middle">
        <p class="middle-title">User Portal </p>
        <p class="middle-text">Apply for loans and track your application.</p>
      </div>
      <div class="user-button">
        <button class="new-button">New Application</button>
        <button class="my-button">My Application</button>
        <button class="document-button">Documents</button>
        <button class="profile-button">Profile</button>
      </div>
      <div>
          <p class="app-title">Apply for Loan </p>
          <p class="app-text">Fill out the application from below.Most applications are reviewed within 24hrs.</p>
        <div class="button-loan">
          <p class="one">Loan Type</p> <p class="two"> Loan Amount </p>
        </div>
        <div class="empty">
          <input type="text" class="blank-type" >
          <input type="text" class="blank-amount">
        </div>
        <div class="button-loan">
          <p class="one">Loan Term</p> <p class="two-purpose">Purpose</p>
        </div>
        <div class="empty">
          <input type="text" class="blank-type" >
          <input type="text" class="blank-amount">
        </div>
        <p class="income"> Annual Income</p>
        <input type="text" class="blank-income">
        <p class="income"> Employment Status</p>
        <input type="text" class="blank-income">
        <p class="income">Upload Documents</p>
        <div class="footer">
          <button class="submit">Submit Application</button>
          <button class="draft">Save as Draft</button>
        </div>
      </div>
  </body>
</html>
